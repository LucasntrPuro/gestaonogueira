<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gestão Nogueira</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body>
    <div id="particles-js"></div>
    
    <div id="tela-login" class="container">
        <div class="login-box">
            <h1>Gestão <span>Nogueira</span></h1>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="fazerLogin()">Entrar</button>
        </div>
    </div>

    <div id="painel-admin" style="display:none;">
        <nav class="sidebar">
            <div id="user-info"></div>
            <ul>
                <li onclick="mostrarAba('vendas')">Vendas</li>
                <li onclick="mostrarAba('estoque')">Estoque</li>
                <li onclick="mostrarAba('historico')">Histórico</li>
                <li onclick="mostrarAba('usuarios')" class="somente-gerente">Usuários</li>
                <li onclick="location.reload()">Sair</li>
            </ul>
        </nav>
        <main class="conteudo">
            <section id="aba-vendas" class="aba">
                <input type="text" id="venda-codigo" placeholder="Código">
                <input type="number" id="venda-qtd" value="1">
                <button onclick="adicionarAoCarrinho()">Adicionar</button>
                <table><tbody id="corpo-carrinho"></tbody></table>
                <h3>Total: <span id="total-valor">R$ 0,00</span></h3>
                <select id="venda-pagamento" onchange="verificarParcelas()">
                    <option value="Pix">Pix</option>
                    <option value="Cartão de Crédito">Cartão de Crédito</option>
                </select>
                <div id="campo-parcelas" style="display:none;"><input type="number" id="venda-parcelas" value="1">x</div>
                <button onclick="finalizarVenda()">Finalizar</button>
            </section>
            
            <section id="aba-estoque" class="aba" style="display:none;">
                <button onclick="abrirModalProduto()">Novo Produto</button>
                <table><tbody id="corpo-estoque"></tbody></table>
            </section>
        </main>
    </div>

    <div id="modal-produto" class="modal" style="display:none;">
        <div class="modal-content">
            <input type="hidden" id="edit-id-produto">
            <input type="text" id="cad-codigo" placeholder="Código">
            <input type="text" id="cad-tipo" placeholder="Descrição">
            <input type="number" id="cad-preco" placeholder="Preço">
            <input type="number" id="cad-qtd" placeholder="Qtd">
            <button onclick="salvarProduto()">Salvar</button>
            <button onclick="fecharModalProduto()">Fechar</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
