<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Nogueira | Sistema</title>
    <link rel="stylesheet" href="main.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body onkeydown="atalhosTeclado(event)">

    <div id="particles-js"></div>

    <div id="tela-login" class="container-central">
        <div class="login-box">
            <h1>Gestão <span>Nogueira</span></h1>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="fazerLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="painel-admin" style="display: none;">
        <nav class="sidebar">
            <div id="user-info"></div>
            <ul>
                <li onclick="mostrarAba('vendas')">🛒 PDV / Vendas</li>
                <li onclick="mostrarAba('estoque')">📦 Estoque</li>
                <li onclick="mostrarAba('historico')">📊 Histórico</li>
                <li onclick="mostrarAba('usuarios')" class="somente-gerente">👥 Usuários</li>
                <li onclick="location.reload()" style="color: #ff4d4d; margin-top: 20px;">🚪 Sair</li>
            </ul>
        </nav>

        <main class="conteudo">
            <section id="aba-vendas" class="aba">
                <div class="pdv-grid">
                    <div class="pdv-inputs">
                        <h2 style="color: #d4af37; margin-bottom: 20px;">Caixa Aberto</h2>
                        <div class="form-group">
                            <label>Cliente</label>
                            <input type="text" id="venda-cliente" placeholder="Consumidor Final">
                        </div>
                        <div class="form-group">
                            <label>Cód. Barras</label>
                            <input type="text" id="venda-codigo" placeholder="Aponte o leitor...">
                        </div>
                        <div class="form-group">
                            <label>Qtd</label>
                            <input type="number" id="venda-qtd" value="1">
                        </div>
                        <button onclick="adicionarAoCarrinho()" style="width: 100%;">ADICIONAR</button>
                    </div>

                    <div class="pdv-lista">
                        <div class="total-display">
                            <p>Total da Venda</p>
                            <h1 id="total-valor">R$ 0,00</h1>
                        </div>
                        <table class="tabela-dark">
                            <thead>
                                <tr>
                                    <th>Produto</th>
                                    <th>Qtd</th>
                                    <th>Preço</th>
                                    <th>Total</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="corpo-carrinho"></tbody>
                        </table>
                        <div class="finalizar-box">
                            <select id="venda-pagamento" onchange="verificarParcelas()">
                                <option value="Dinheiro">Dinheiro</option>
                                <option value="Pix">Pix</option>
                                <option value="Cartão de Débito">Débito</option>
                                <option value="Cartão de Crédito">Crédito</option>
                            </select>
                            <div id="campo-parcelas" style="display:none;">
                                <input type="number" id="venda-parcelas" value="1" min="1">x
                            </div>
                            <button onclick="finalizarVenda()" class="btn-finalizar">FINALIZAR VENDA (F9)</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-produto" class="modal">
        <div class="modal-content">
            <h3 class="modal-titulo">Produto</h3>
            <input type="hidden" id="edit-id-produto">
            <input type="text" id="cad-codigo" placeholder="Código">
            <input type="text" id="cad-tipo" placeholder="Descrição">
            <input type="number" id="cad-preco" placeholder="Preço">
            <input type="number" id="cad-qtd" placeholder="Qtd">
            <div class="modal-actions">
                <button onclick="salvarProduto()">GRAVAR</button>
                <button onclick="fecharModalProduto()" class="btn-cancelar-modal">VOLTAR</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
