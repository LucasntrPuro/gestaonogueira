<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Nogueira | Sistema</title>
    <link rel="stylesheet" href="main.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body onkeydown="atalhosTeclado(event)">

    <div id="particles-js"></div>

    <div id="tela-login" class="container-central">
        <div class="login-box">
            <h1>Gestão <span>Nogueira</span></h1>
            <input type="text" id="user" placeholder="Usuário" autofocus>
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="fazerLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="painel-admin" style="display: none;">
        <aside class="sidebar">
            <h2 style="color: #d4af37;">G. Nogueira</h2>
            <div id="user-info" style="font-size: 0.8rem; color: #888; margin-bottom: 20px;"></div>
            <ul>
                <li onclick="mostrarAba('vendas')">🛒 PDV / Vendas</li>
                <li onclick="mostrarAba('estoque')">📦 Estoque</li>
                <li onclick="mostrarAba('historico')">📊 Histórico</li>
                <li onclick="mostrarAba('usuarios')" class="somente-gerente">👥 Usuários</li>
                <li onclick="location.reload()" style="color: #ff4d4d; margin-top: auto;">🚪 Sair</li>
            </ul>
        </aside>

        <main class="conteudo">
            <section id="aba-vendas" class="aba">
                <div class="pdv-grid">
                    <div class="pdv-inputs">
                        <h2 style="color: #d4af37; margin-bottom: 20px;">Caixa</h2>
                        <div class="form-group">
                            <label>Cód. Barras</label>
                            <input type="text" id="venda-codigo" placeholder="Aponte o leitor...">
                        </div>
                        <div class="form-group">
                            <label>Qtd</label>
                            <input type="number" id="venda-qtd" value="1">
                        </div>
                        <button onclick="adicionarAoCarrinho()" style="width: 100%;">ADICIONAR</button>
                    </div>

                    <div class="pdv-lista">
                        <div class="total-display">
                            <p>Total da Venda</p>
                            <h1 id="total-valor">R$ 0,00</h1>
                        </div>
                        <table class="tabela-dark">
                            <thead>
                                <tr>
                                    <th>Produto</th>
                                    <th>Qtd</th>
                                    <th>Preço</th>
                                    <th>Total</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="corpo-carrinho"></tbody>
                        </table>
                        <button onclick="finalizarVenda()" class="btn-finalizar">FINALIZAR (F9)</button>
                    </div>
                </div>
            </section>

            <section id="aba-estoque" class="aba" style="display: none;">
                <div class="header-aba">
                    <h2>Estoque</h2>
                    <button class="somente-gerente" onclick="abrirModalProduto()">+ NOVO PRODUTO</button>
                </div>
                <table class="tabela-dark">
                    <thead><tr><th>Código</th><th>Descrição</th><th>Preço</th><th>Qtd</th><th class="somente-gerente">Ações</th></tr></thead>
                    <tbody id="corpo-estoque"></tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="modal-produto" class="modal">
        <div class="modal-content">
            <h3 class="modal-titulo">Produto</h3>
            <input type="hidden" id="edit-id-produto">
            <div class="form-group"><label>Cód. Barras</label><input type="text" id="cad-codigo"></div>
            <div class="form-group"><label>Descrição</label><input type="text" id="cad-tipo"></div>
            <div class="form-group"><label>Preço</label><input type="number" id="cad-preco" step="0.01"></div>
            <div class="form-group"><label>Qtd</label><input type="number" id="cad-qtd"></div>
            <div class="modal-actions">
                <button onclick="salvarProduto()">GRAVAR</button>
                <button onclick="fecharModalProduto()" class="btn-cancelar-modal">VOLTAR</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
