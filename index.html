<body onkeydown="atalhosTeclado(event)">
    <div id="particles-js"></div>

    <div id="tela-login" class="container-central">
        <div class="login-box">
            <h1>Gestão <span>Nogueira</span></h1>
            <input type="text" id="user" placeholder="Usuário" autofocus>
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="fazerLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="painel-admin" style="display: none;">
        <aside class="sidebar">
            <h2>G. Nogueira</h2>
            <div id="user-info"></div>
            <ul>
                <li onclick="mostrarAba('vendas')">🛒 PDV</li>
                <li onclick="mostrarAba('estoque')">📦 Estoque</li>
                <li onclick="mostrarAba('historico')">📊 Histórico</li>
                <li onclick="mostrarAba('usuarios')" class="somente-gerente">👥 Usuários</li>
            </ul>
        </aside>

        <main class="conteudo">
            <section id="aba-vendas" class="aba">
                <div class="pdv-grid">
                    <div class="pdv-inputs">
                        <h2>Caixa</h2>
                        <div class="form-group"><label>Cliente</label><input type="text" id="venda-cliente"></div>
                        <div class="form-group"><label>Código</label><input type="text" id="venda-codigo"></div>
                        <div class="form-group"><label>Qtd</label><input type="number" id="venda-qtd" value="1"></div>
                        <button onclick="adicionarAoCarrinho()">ADICIONAR</button>
                    </div>
                    <div class="pdv-lista">
                        <div class="total-display"><p>Total</p><h1 id="total-valor">R$ 0,00</h1></div>
                        <table class="tabela-dark">
                            <thead><tr><th>Produto</th><th>Qtd</th><th>Preço</th><th>Total</th><th>Ações</th></tr></thead>
                            <tbody id="corpo-carrinho"></tbody>
                        </table>
                        <select id="venda-pagamento"><option>Dinheiro</option><option>Pix</option><option>Cartão</option></select>
                        <button onclick="finalizarVenda()" class="btn-finalizar">FINALIZAR (F9)</button>
                    </div>
                </div>
            </section>

            <section id="aba-estoque" class="aba" style="display:none">
                <h2>Estoque</h2>
                <table class="tabela-dark"><tbody id="corpo-estoque"></tbody></table>
            </section>

            <section id="aba-historico" class="aba" style="display:none">
                <h2>Histórico</h2>
                <table class="tabela-dark"><thead><tr><th>Data</th><th>Cliente</th><th>Pagamento</th><th>Total</th><th>Ações</th></tr></thead><tbody></tbody></table>
            </section>

            <section id="aba-usuarios" class="aba" style="display:none">
                <div style="display:flex; justify-content:space-between">
                    <h2>Usuários</h2>
                    <button onclick="abrirModalUsuario()">+ NOVO</button>
                </div>
                <table class="tabela-dark"><thead><tr><th>Login</th><th>Nível</th><th>Status</th><th>Ações</th></tr></thead><tbody id="corpo-usuarios"></tbody></table>
            </section>
        </main>
    </div>

    <div id="modal-usuario" class="modal">
        <div class="modal-content">
            <h3>Usuário</h3>
            <input type="hidden" id="edit-id-usuario">
            <div class="form-group"><label>Login</label><input type="text" id="user-login"></div>
            <div class="form-group"><label>Senha</label><input type="password" id="user-senha"></div>
            <div class="form-group"><label>Nível</label><select id="user-nivel"><option value="operador">Operador</option><option value="gerente">Gerente</option></select></div>
            <div class="form-group"><label>Status</label><select id="user-status"><option value="true">Ativo</option><option value="false">Inativo</option></select></div>
            <button onclick="salvarUsuario()">GRAVAR</button>
            <button onclick="fecharModalUsuario()">CANCELAR</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
