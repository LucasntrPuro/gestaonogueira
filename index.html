<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Nogueira | Sistema</title>
    <link rel="stylesheet" href="main.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body onkeydown="atalhosTeclado(event)">

    <div id="particles-js" style="position: fixed; width: 100%; height: 100%; background-color: #000; z-index: 1;"></div>

    <div id="tela-login" class="container-central">
        <div class="login-box">
            <h1 style="color: #fff; margin-bottom: 20px;">Gestão <span style="color: #d4af37;">Nogueira</span></h1>
            <input type="text" id="user" placeholder="Usuário" autofocus>
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="fazerLogin()" style="width: 100%; margin-top: 10px;">ENTRAR</button>
        </div>
    </div>

    <div id="painel-admin" style="display: none; display: flex; height: 100vh; position: relative; z-index: 10;">
        <aside class="sidebar">
            <h2 style="color: #d4af37; margin-bottom: 30px;">G. Nogueira</h2>
            <div id="user-info" style="font-size: 0.8rem; color: #888; margin-bottom: 20px;"></div>
            <ul>
                <li onclick="mostrarAba('vendas')">🛒 PDV / Vendas</li>
                <li onclick="mostrarAba('estoque')">📦 Estoque</li>
                <li onclick="mostrarAba('historico')">📊 Histórico</li>
                <li id="menu-usuarios" onclick="mostrarAba('usuarios')" class="somente-gerente">👥 Usuários</li>
                <li onclick="location.reload()" style="color: #ff4d4d; margin-top: auto;">🚪 Sair</li>
            </ul>
        </aside>

        <main class="conteudo">
            <section id="aba-vendas" class="aba">
                <div class="pdv-grid">
                    <div class="pdv-inputs">
                        <h2 style="color: #d4af37; margin-bottom: 20px;">Caixa</h2>
                        <div class="form-group"><label>Cliente</label><input type="text" id="venda-cliente" placeholder="Consumidor"></div>
                        <div class="form-group"><label>Cód. Barras</label><input type="text" id="venda-codigo"></div>
                        <div class="form-group"><label>Qtd</label><input type="number" id="venda-qtd" value="1"></div>
                        <button onclick="adicionarAoCarrinho()" style="width: 100%;">ADICIONAR</button>
                    </div>
                    <div class="pdv-lista">
                        <div class="total-display"><p>Total</p><h1 id="total-valor">R$ 0,00</h1></div>
                        <table class="tabela-dark">
                            <thead><tr><th>Produto</th><th>Qtd</th><th>Preço</th><th>Total</th><th>Ações</th></tr></thead>
                            <tbody id="corpo-carrinho"></tbody>
                        </table>
                        <div class="finalizar-box" style="margin-top:20px; display:flex; gap:10px;">
                            <select id="venda-pagamento"><option>Dinheiro</option><option>Pix</option><option>Cartão de Débito</option><option>Cartão de Crédito</option></select>
                            <button onclick="finalizarVenda()" class="btn-finalizar" style="flex:1;">FINALIZAR (F9)</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="aba-estoque" class="aba" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Estoque</h2>
                    <button class="somente-gerente" onclick="abrirModalProduto()">+ NOVO PRODUTO</button>
                </div>
                <table class="tabela-dark">
                    <thead><tr><th>Cód. Barras</th><th>Descrição</th><th>Tamanho</th><th>Preço</th><th>Qtd</th><th>Ações</th></tr></thead>
                    <tbody id="corpo-estoque"></tbody>
                </table>
            </section>

            <section id="aba-historico" class="aba" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Histórico</h2>
                    <div><button onclick="gerarPDF()">PDF</button><button onclick="gerarExcel()">Excel</button></div>
                </div>
                <table class="tabela-dark">
                    <thead><tr><th>Data</th><th>Cliente</th><th>Pagamento</th><th>Total</th><th>Ações</th></tr></thead>
                    <tbody id="corpo-historico"></tbody>
                </table>
            </section>

            <section id="aba-usuarios" class="aba" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Equipa</h2>
                    <button onclick="abrirModalUsuario()">+ NOVO USUÁRIO</button>
                </div>
                <table class="tabela-dark">
                    <thead><tr><th>Login</th><th>Nível</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="corpo-usuarios"></tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="modal-produto" class="modal">
        <div class="modal-content">
            <h3 class="modal-titulo">Produto</h3>
            <input type="hidden" id="edit-id-produto">
            <div class="form-group"><label>Cód. Barras</label><input type="text" id="cad-codigo"></div>
            <div class="form-group"><label>Descrição</label><input type="text" id="cad-tipo"></div>
            <div class="form-group"><label>Tamanho</label><input type="text" id="cad-tamanho" placeholder="Ex: P, M, G, 42"></div>
            <div class="form-group"><label>Preço</label><input type="number" id="cad-preco" step="0.01"></div>
            <div class="form-group"><label>Qtd</label><input type="number" id="cad-qtd"></div>
            <div class="modal-actions" style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="salvarProduto()" class="btn-salvar-modal">GRAVAR</button>
                <button onclick="fecharModalProduto()" class="btn-cancelar-modal">VOLTAR</button>
            </div>
        </div>
    </div>

    <div id="modal-usuario" class="modal">
        <div class="modal-content">
            <h3 class="modal-titulo">Usuário</h3>
            <input type="hidden" id="edit-id-usuario">
            <div class="form-group"><label>Login</label><input type="text" id="user-login"></div>
            <div class="form-group"><label>Senha</label><input type="password" id="user-senha"></div>
            <div class="form-group"><label>Nível</label><select id="user-nivel"><option value="operador">Operador</option><option value="gerente">Gerente</option></select></div>
            <div class="form-group"><label>Status</label><select id="user-status"><option value="true">Ativo</option><option value="false">Inativo</option></select></div>
            <div class="modal-actions" style="margin-top:20px; display:flex; gap:10px;">
                <button onclick="salvarUsuario()" class="btn-salvar-modal">GRAVAR</button>
                <button onclick="fecharModalUsuario()" class="btn-cancelar-modal">VOLTAR</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
