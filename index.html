<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Nogueira | Sistema</title>
    <link rel="stylesheet" href="main.css"> 
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
</head>
<body onkeydown="atalhosTeclado(event)">

    <div id="particles-js"></div>

    <div id="tela-login" class="container-central">
        <div class="login-box">
            <h1>Gestão <span>Nogueira</span></h1>
            <input type="text" id="user" placeholder="Usuário" autofocus>
            <input type="password" id="pass" placeholder="Senha">
            <button onclick="fazerLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="painel-admin" style="display: none;">
        <aside class="sidebar">
            <h2>G. Nogueira</h2>
            <div id="user-info" style="font-size: 0.8rem; color: #888; margin-bottom: 20px;"></div>
            <ul>
                <li onclick="mostrarAba('vendas')">🛒 PDV / Vendas</li>
                <li onclick="mostrarAba('estoque')">📦 Estoque</li>
                <li onclick="mostrarAba('historico')">📊 Histórico</li>
                <li onclick="mostrarAba('usuarios')" class="somente-gerente">👥 Usuários</li>
                <li onclick="location.reload()" style="color: #ff4d4d; margin-top: auto;">🚪 Sair</li>
            </ul>
        </aside>

        <main class="conteudo">
            <section id="aba-vendas" class="aba">
                <div class="pdv-grid">
                    <div class="pdv-inputs">
                        <h2 style="color: #d4af37; margin-bottom: 20px;">Caixa</h2>
                        <input type="text" id="venda-cliente" placeholder="Cliente">
                        <input type="text" id="venda-codigo" placeholder="Cód. Barras">
                        <input type="number" id="venda-qtd" value="1">
                        <button onclick="adicionarAoCarrinho()" style="width: 100%;">ADICIONAR</button>
                    </div>
                    <div class="pdv-lista">
                        <div class="total-display">
                            <p>Total</p>
                            <h1 id="total-valor">R$ 0,00</h1>
                        </div>
                        <table class="tabela-dark">
                            <thead><tr><th>Item</th><th>Qtd</th><th>Preço</th><th>Ações</th></tr></thead>
                            <tbody id="corpo-carrinho"></tbody>
                        </table>
                        <button onclick="finalizarVenda()" class="btn-finalizar">FINALIZAR (F9)</button>
                    </div>
                </div>
            </section>

            <section id="aba-estoque" class="aba" style="display:none;">
                <h2>Estoque</h2>
                <table class="tabela-dark"><tbody id="corpo-estoque"></tbody></table>
            </section>
            
            <section id="aba-historico" class="aba" style="display:none;">
                <h2>Histórico</h2>
                <table class="tabela-dark"><thead><tr><th>Data</th><th>Cliente</th><th>Total</th><th>Ações</th></tr></thead><tbody></tbody></table>
            </section>

            <section id="aba-usuarios" class="aba" style="display:none;">
                <div style="display:flex; justify-content:space-between;">
                    <h2>Usuários</h2>
                    <button onclick="abrirModalUsuario()">+ NOVO</button>
                </div>
                <table class="tabela-dark"><thead><tr><th>Login</th><th>Nível</th><th>Status</th><th>Ações</th></tr></thead><tbody id="corpo-usuarios"></tbody></table>
            </section>
        </main>
    </div>

    <div id="modal-usuario" class="modal">
        <div class="modal-content">
            <h3 class="modal-titulo">Usuário</h3>
            <input type="hidden" id="edit-id-usuario">
            <input type="text" id="user-login" placeholder="Login">
            <input type="password" id="user-senha" placeholder="Senha">
            <select id="user-nivel"><option value="operador">Operador</option><option value="gerente">Gerente</option></select>
            <select id="user-status"><option value="true">Ativo</option><option value="false">Inativo</option></select>
            <div class="modal-actions">
                <button onclick="salvarUsuario()">GRAVAR</button>
                <button onclick="fecharModalUsuario()" style="background:#444;">VOLTAR</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
